services:
  onlinemat:
    image: onlinemat-local-dev
    working_dir: /workspace/onlinemat
    command: >
      sh -c "if command -v yarn >/dev/null 2>&1; then
      yarn --version;
      elif command -v corepack >/dev/null 2>&1; then
      corepack enable && corepack prepare yarn@1.22.22 --activate;
      else
      apk add --no-cache yarn;
      fi &&
      yarn config set registry https://registry.npmjs.org &&
      [ -f node_modules/.yarn-integrity ] || (
      for i in 1 2 3; do
      yarn install --frozen-lockfile && break;
      echo 'yarn install failed, retrying in 5s...';
      sleep 5;
      done
      ) &&
      yarn dev --host 0.0.0.0 --port 3000"
    volumes:
      - ./:/workspace/onlinemat
      - onlinemat_node_modules:/workspace/onlinemat/node_modules
    environment:
      VITE_USE_FIREBASE_EMULATOR: 'true'
      VITE_FIREBASE_EMULATOR_HOST: '127.0.0.1'
      VITE_USE_LOCAL_AUTH_MOCK: 'true'
      VITE_FIREBASE_PROJECT_ID: 'onlinemat-dev'
      VITE_FIREBASE_API_KEY: 'fake-api-key'
      VITE_FIREBASE_AUTH_DOMAIN: 'localhost'
      VITE_FIREBASE_STORAGE_BUCKET: 'onlinemat-dev.appspot.com'
      VITE_FIREBASE_MESSAGING_SENDER_ID: '123456789'
      VITE_FIREBASE_APP_ID: '1:123456789:web:abc123'
      VITE_SENTRY_DNS: ''
      VITE_AUTH0_DOMAIN: 'fake-auth0.local'
      VITE_AUTH0_CLIENT_ID: 'fake-client-id'
      VITE_DEV_ENV: 'true'
    read_only: false
    depends_on:
      firebase-emulator:
        condition: service_started
      firebase-seed:
        condition: service_completed_successfully

  firebase-emulator:
    image: node:22-alpine
    working_dir: /workspace/onlinemat-config
    command: >
      sh -c "if command -v yarn >/dev/null 2>&1; then
      yarn --version;
      elif command -v corepack >/dev/null 2>&1; then
      corepack enable && corepack prepare yarn@1.22.22 --activate;
      else
      apk add --no-cache yarn;
      fi &&
      if ! command -v java >/dev/null 2>&1; then
      apk add --no-cache openjdk21-jre || apk add --no-cache openjdk21-jre-headless;
      fi &&
      yarn config set registry https://registry.npmjs.org &&
      [ -f node_modules/.yarn-integrity ] || (
      for i in 1 2 3; do
      yarn install --frozen-lockfile && break;
      echo 'root yarn install failed, retrying in 5s...';
      sleep 5;
      done
      ) &&
      [ -f firebase/functions/node_modules/.yarn-integrity ] || (
      for i in 1 2 3; do
      yarn --cwd firebase/functions install --frozen-lockfile && break;
      echo 'functions yarn install failed, retrying in 5s...';
      sleep 5;
      done
      ) &&
      yarn --cwd firebase/functions build &&
      yarn run firebase emulators:start --project onlinemat-dev --only auth,firestore,functions,ui"
    volumes:
      - ../onlinemat-config:/workspace/onlinemat-config
      - onlinemat_config_node_modules:/workspace/onlinemat-config/node_modules
      - onlinemat_functions_node_modules:/workspace/onlinemat-config/firebase/functions/node_modules
    environment:
      FIREBASE_AUTH_EMULATOR_HOST: '0.0.0.0:9099'
      FIRESTORE_EMULATOR_HOST: '0.0.0.0:8080'
      GCLOUD_PROJECT: 'onlinemat-dev'
    ports:
      - '4000:4000'
      - '5001:5001'
      - '8080:8080'
      - '9099:9099'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000 > /dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  firebase-seed:
    image: node:22-alpine
    working_dir: /workspace/onlinemat-config
    command: >
      sh -c "if command -v yarn >/dev/null 2>&1; then
      yarn --version;
      elif command -v corepack >/dev/null 2>&1; then
      corepack enable && corepack prepare yarn@1.22.22 --activate;
      else
      apk add --no-cache yarn;
      fi &&
      yarn config set registry https://registry.npmjs.org &&
      [ -f node_modules/.yarn-integrity ] || (
      for i in 1 2 3; do
      yarn install --frozen-lockfile && break;
      echo 'seed yarn install failed, retrying in 5s...';
      sleep 5;
      done
      ) &&
      node scripts/seed-emulators.js"
    volumes:
      - ../onlinemat-config:/workspace/onlinemat-config
      - onlinemat_config_node_modules:/workspace/onlinemat-config/node_modules
    environment:
      FIREBASE_EMULATOR_HOST: 'firebase-emulator'
      FIREBASE_PROJECT_ID: 'onlinemat-dev'
      FIREBASE_API_KEY: 'fake-api-key'
    depends_on:
      firebase-emulator:
        condition: service_started
    restart: "no"

volumes:
  onlinemat_node_modules:
  onlinemat_config_node_modules:
  onlinemat_functions_node_modules:
